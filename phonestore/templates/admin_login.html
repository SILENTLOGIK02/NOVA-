{% extends "base.html" %}
{% block title %}تسجيل الدخول - {{ STORE_NAME }}{% endblock %}
{% block content %}
<div class="form-card">
  <h1>🔐 لوحة التحكم</h1>
  <form method="post">
    <div class="form-group"><label>البريد الإلكتروني</label><input type="email" name="email" required></div>
    <div class="form-group"><label>كلمة المرور</label><input type="password" name="password" required></div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">دخول</button>
  </form>
  <p style="margin-top:16px;color:var(--text-dim);text-align:center;font-size:.85rem">
    الافتراضي: admin@nova.com / admin123
  </p>
</div>
{% endblock %}
